name: CI

on:
    pull_request:
        branches: [main]
        paths:
            - "package.json"
            - "bun.lock"
            - "tsconfig.json"
            - "**/*.ts"
            - "**/*.tsx"
            - "**/*.js"
            - "**/*.jsx"

jobs:
    typescript-tests:
        name: TypeScript Tests
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun ci

            - name: Run type checking
              run: bun run typecheck

            - name: Run linting
              run: bun run lint

            - name: Run tests with coverage
              run: bun test --coverage --coverage-reporter=lcov

            - name: Run ordering contract checks
              run: bun run test:ordering-contract

            - name: Emit ordering contract canary metrics
              run: ATOMIC_ORDERING_CONTRACT_CANARY=1 bun run metrics:ordering-contract > ordering-contract-metrics.json

            - name: Upload ordering contract canary metrics
              uses: actions/upload-artifact@v7
              with:
                  name: ordering-contract-canary-metrics
                  path: ordering-contract-metrics.json

            - name: Upload coverage
              uses: codecov/codecov-action@v5
              with:
                  file: ./coverage/lcov.info
