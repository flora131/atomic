name: Installer Validation

on:
    pull_request:
        branches: [main]
        paths:
            - "install.sh"
            - "install.ps1"
            - ".github/workflows/installer-validation.yml"
    workflow_dispatch:

jobs:
    validate-install-sh:
        name: Validate install.sh (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest]

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Validate shell script syntax
              shell: bash
              run: bash -n ./install.sh

            - name: Run ShellCheck
              uses: ludeeus/action-shellcheck@2.0.0
              with:
                  scandir: "."
                  additional_files: "install.sh"
                  ignore_paths: "devcontainer-features"

    validate-install-ps1:
        name: Validate install.ps1 (windows-latest)
        runs-on: windows-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Validate PowerShell syntax
              shell: pwsh
              run: |
                  $tokens = $null
                  $errors = $null
                  $null = [System.Management.Automation.Language.Parser]::ParseFile(
                      (Resolve-Path ./install.ps1),
                      [ref]$tokens,
                      [ref]$errors
                  )
                  if ($errors.Count -gt 0) {
                      $errors | ForEach-Object { Write-Error $_ }
                      throw "install.ps1 has $($errors.Count) syntax error(s)"
                  }
                  Write-Host "install.ps1 syntax is valid"

            - name: Run PSScriptAnalyzer
              shell: pwsh
              run: |
                  Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
                  $results = Invoke-ScriptAnalyzer -Path ./install.ps1 -Severity Error,Warning `
                      -ExcludeRule PSUseBOMForUnicodeEncodedFile,PSUseSingularNouns
                  if ($results) {
                      $results | Format-Table -AutoSize
                      throw "PSScriptAnalyzer found $($results.Count) issue(s)"
                  }
                  Write-Host "PSScriptAnalyzer: no issues found"
