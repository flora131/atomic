name: Publish Devcontainer Features

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'devcontainer-features/src/**'

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Sync feature versions from package.json
        run: |
          VERSION=$(jq -r .version package.json)
          for feature in devcontainer-features/src/*/devcontainer-feature.json; do
            jq --arg v "$VERSION" '.version = $v' "$feature" > tmp.json && mv tmp.json "$feature"
          done

      - name: Publish Features
        uses: devcontainers/action@v1
        with:
          publish-features: "true"
          base-path-to-features: "./devcontainer-features/src"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
