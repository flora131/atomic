name: Publish

on:
  pull_request:
    types: [closed]
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request'
      || (github.event.pull_request.merged == true
      && (startsWith(github.event.pull_request.head.ref, 'release/')
      || startsWith(github.event.pull_request.head.ref, 'prerelease/')))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun ci

      - name: Install all platform-specific opentui native bindings
        run: bun run prepare:opentui-bindings

      - name: Run tests
        run: bun test 2>&1 | cat

      - name: Run typecheck
        run: bun run typecheck

      - name: Build binaries for all platforms
        run: |
          mkdir -p dist

          # Linux x64
          bun run src/scripts/build-binary.ts --minify --target=bun-linux-x64 --outfile dist/atomic-linux-x64

          # Linux arm64
          bun run src/scripts/build-binary.ts --minify --target=bun-linux-arm64 --outfile dist/atomic-linux-arm64

          # macOS x64
          bun run src/scripts/build-binary.ts --minify --target=bun-darwin-x64 --outfile dist/atomic-darwin-x64

          # macOS arm64 (Apple Silicon)
          bun run src/scripts/build-binary.ts --minify --target=bun-darwin-arm64 --outfile dist/atomic-darwin-arm64

      - name: Create config archives
        run: |
          # Create a staging directory for config files
          mkdir -p config-staging

          # Copy config directories (same as package.json "files" for binary distribution)
          cp -r .claude config-staging/
          cp -r .opencode config-staging/
          cp .mcp.json config-staging/
          mkdir -p config-staging/.github
          cp -r .github/skills config-staging/.github/
          cp -r .github/agents config-staging/.github/
          cp .github/lsp.json config-staging/.github/
          mkdir -p config-staging/.vscode
          cp .vscode/mcp.json config-staging/.vscode/

          # Remove node_modules from .opencode if present
          rm -rf config-staging/.opencode/node_modules

          # Create tarball for Unix systems (preserves permissions)
          tar -czvf dist/atomic-config.tar.gz -C config-staging .

          # Create zip for Windows
          cd config-staging && zip -r ../dist/atomic-config.zip . && cd ..

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: dist/

  build-windows:
    name: Build Windows Binaries
    runs-on: windows-latest
    if: >-
      github.event_name != 'pull_request'
      || (github.event.pull_request.merged == true
      && (startsWith(github.event.pull_request.head.ref, 'release/')
      || startsWith(github.event.pull_request.head.ref, 'prerelease/')))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun ci

      - name: Install all platform-specific opentui native bindings
        run: bun run prepare:opentui-bindings

      - name: Build Windows x64 binary
        run: |
          mkdir dist

          # Windows x64 (standard, with AVX for native x64 users)
          bun run src/scripts/build-binary.ts --minify --outfile dist/atomic-windows-x64.exe

      - name: Download baseline Bun runtime
        shell: bash
        run: |
          BUN_VERSION=$(bun --version)
          curl -fsSL "https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/bun-windows-x64-baseline.zip" -o bun-baseline.zip
          unzip -q bun-baseline.zip -d bun-baseline

      - name: Build Windows arm64 binary
        shell: bash
        run: |
          # Use baseline Bun to compile natively (embeds baseline runtime, no --target needed)
          ./bun-baseline/bun-windows-x64-baseline/bun.exe run src/scripts/build-binary.ts --minify --baseline --outfile dist/atomic-windows-arm64.exe

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-windows
          path: dist/

  validate-binaries:
    name: Validate ${{ matrix.binary }}
    needs: [build, build-windows]
    strategy:
      fail-fast: false
      matrix:
        include:
          - binary: atomic-linux-x64
            runner: ubuntu-latest
            artifact: binaries
            os: linux
            config-archive: atomic-config.tar.gz

          - binary: atomic-linux-arm64
            runner: ubuntu-24.04-arm
            artifact: binaries
            os: linux
            config-archive: atomic-config.tar.gz

          - binary: atomic-darwin-x64
            runner: macos-15-intel
            artifact: binaries
            os: darwin
            config-archive: atomic-config.tar.gz

          - binary: atomic-darwin-arm64
            runner: macos-latest
            artifact: binaries
            os: darwin
            config-archive: atomic-config.tar.gz

          - binary: atomic-windows-x64.exe
            runner: windows-latest
            artifact: binaries-windows
            os: windows
            config-archive: atomic-config.zip

          - binary: atomic-windows-arm64.exe
            runner: windows-11-arm
            artifact: binaries-windows
            os: windows
            config-archive: atomic-config.zip

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: dist/

      - name: Download config archive (Windows)
        if: matrix.os == 'windows'
        uses: actions/download-artifact@v8
        with:
          name: binaries
          path: dist/

      - name: Make binary executable (Unix)
        if: matrix.os != 'windows'
        run: chmod +x ./dist/${{ matrix.binary }}

      - name: Verify binary executes
        shell: bash
        env:
          BINARY: ${{ matrix.binary }}
        run: ./dist/"$BINARY" --version > /dev/null 2>&1

      - name: Verify version string
        shell: bash
        env:
          BINARY: ${{ matrix.binary }}
        run: |
          VERSION_OUTPUT=$(./dist/"$BINARY" --version 2>&1)
          echo "Version output: $VERSION_OUTPUT"

          EXPECTED_VERSION=$(jq -r .version package.json)
          if echo "$VERSION_OUTPUT" | grep -q "$EXPECTED_VERSION"; then
            echo "Version check passed: found $EXPECTED_VERSION"
          else
            echo "::error::Version mismatch. Expected '$EXPECTED_VERSION' in output: '$VERSION_OUTPUT'"
            exit 1
          fi

      - name: Smoke test --help
        shell: bash
        env:
          BINARY: ${{ matrix.binary }}
        run: ./dist/"$BINARY" --help

      - name: Validate config archive (Unix)
        if: matrix.os != 'windows'
        env:
          CONFIG_ARCHIVE: ${{ matrix.config-archive }}
        run: |
          mkdir -p config-test
          tar -xzf "dist/$CONFIG_ARCHIVE" -C config-test
          # Verify all archived config entries exist
          test -d config-test/.claude || (echo "::error::Missing .claude config" && exit 1)
          test -d config-test/.opencode || (echo "::error::Missing .opencode config" && exit 1)
          test -f config-test/.mcp.json || (echo "::error::Missing .mcp.json" && exit 1)
          test -d config-test/.github/skills || (echo "::error::Missing .github/skills" && exit 1)
          test -d config-test/.github/agents || (echo "::error::Missing .github/agents" && exit 1)
          test -f config-test/.github/lsp.json || (echo "::error::Missing .github/lsp.json" && exit 1)
          test -f config-test/.vscode/mcp.json || (echo "::error::Missing .vscode/mcp.json" && exit 1)
          echo "Config archive validation passed"

      - name: Validate config archive (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          CONFIG_ARCHIVE: ${{ matrix.config-archive }}
        run: |
          New-Item -ItemType Directory -Path config-test -Force
          Expand-Archive -Path "dist/$env:CONFIG_ARCHIVE" -DestinationPath config-test
          # Verify all archived config entries exist
          if (-not (Test-Path "config-test/.claude")) { Write-Error "Missing .claude config"; exit 1 }
          if (-not (Test-Path "config-test/.opencode")) { Write-Error "Missing .opencode config"; exit 1 }
          if (-not (Test-Path "config-test/.mcp.json")) { Write-Error "Missing .mcp.json"; exit 1 }
          if (-not (Test-Path "config-test/.github/skills")) { Write-Error "Missing .github/skills"; exit 1 }
          if (-not (Test-Path "config-test/.github/agents")) { Write-Error "Missing .github/agents"; exit 1 }
          if (-not (Test-Path "config-test/.github/lsp.json")) { Write-Error "Missing .github/lsp.json"; exit 1 }
          if (-not (Test-Path "config-test/.vscode/mcp.json")) { Write-Error "Missing .vscode/mcp.json"; exit 1 }
          Write-Host "Config archive validation passed"

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, build-windows, validate-binaries]


    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: binaries
          path: dist/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: binaries-windows
          path: dist/

      - name: Get version from package.json
        id: version
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Determine release type
        id: release-type
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "make_latest=false" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "make_latest=true" >> $GITHUB_OUTPUT
          fi

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Delete existing release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null | while read -r name; do
            gh release delete-asset "$TAG" "$name" --yes 2>/dev/null || true
          done
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ steps.release-type.outputs.is_prerelease == 'true' }}
          make_latest: ${{ steps.release-type.outputs.make_latest }}
          generate_release_notes: true
          files: |
            dist/atomic-linux-x64
            dist/atomic-linux-arm64
            dist/atomic-darwin-x64
            dist/atomic-darwin-arm64
            dist/atomic-windows-x64.exe
            dist/atomic-windows-arm64.exe
            dist/atomic-config.tar.gz
            dist/atomic-config.zip
            dist/checksums.txt

  test-features:
    name: Test Devcontainer Features
    needs: [release]
    uses: ./.github/workflows/test-features.yml

  publish-features:
    name: Publish Devcontainer Features
    runs-on: ubuntu-latest
    needs: [test-features]
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Sync feature versions from package.json
        run: |
          VERSION=$(jq -r .version package.json)
          for feature in devcontainer-features/src/*/devcontainer-feature.json; do
            jq --arg v "$VERSION" '.version = $v' "$feature" > tmp.json && mv tmp.json "$feature"
          done

      - name: Publish Features
        uses: devcontainers/action@v1
        with:
          publish-features: "true"
          base-path-to-features: "./devcontainer-features/src"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-workflow-sdk:
    name: Publish Workflow SDK to npm
    runs-on: ubuntu-latest
    needs: [test-features]
    permissions:
      contents: read
      id-token: write # Required for OIDC provenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun ci
        working-directory: packages/workflow-sdk

      - name: Run tests
        run: bun test 2>&1 | cat
        working-directory: packages/workflow-sdk

      - name: Run typecheck
        run: bun run typecheck
        working-directory: packages/workflow-sdk

      - name: Run lint
        run: bun run lint
        working-directory: packages/workflow-sdk

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: Determine npm publish tag
        id: npm-tag
        working-directory: packages/workflow-sdk
        run: |
          VERSION=$(jq -r .version package.json)
          if [[ "$VERSION" == *-* ]]; then
            echo "tag=next" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public --tag ${{ steps.npm-tag.outputs.tag }}
        working-directory: packages/workflow-sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
