name: Publish

on:
  pull_request:
    types: [closed]
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request'
      || (github.event.pull_request.merged == true
      && (startsWith(github.event.pull_request.head.ref, 'release/')
      || startsWith(github.event.pull_request.head.ref, 'prerelease/')))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun ci

      - name: Install cross-platform native modules
        run: |
          OTUI_VERSION=$(bun -e "console.log(require('./node_modules/@opentui/core/package.json').version)")
          bun install --os="*" --cpu="*" @opentui/core@$OTUI_VERSION

      - name: Run tests
        run: bun run test 2>&1 | cat

      - name: Run typecheck
        run: bun run typecheck

      - name: Build binaries for all platforms
        run: bun run src/scripts/build-binaries.ts

      - name: Create config archives
        run: bun run src/scripts/create-config-archives.ts

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: dist/

  validate-binaries:
    name: Validate ${{ matrix.binary }}
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - binary: atomic-linux-x64
            runner: ubuntu-latest
            os: linux
            config-archive: atomic-config.tar.gz

          - binary: atomic-linux-arm64
            runner: ubuntu-24.04-arm
            os: linux
            config-archive: atomic-config.tar.gz

          - binary: atomic-darwin-x64
            runner: macos-15-intel
            os: darwin
            config-archive: atomic-config.tar.gz

          - binary: atomic-darwin-arm64
            runner: macos-latest
            os: darwin
            config-archive: atomic-config.tar.gz

          - binary: atomic-windows-x64.exe
            runner: windows-latest
            os: windows
            config-archive: atomic-config.zip

          - binary: atomic-windows-arm64.exe
            runner: windows-11-arm
            os: windows
            config-archive: atomic-config.zip

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: binaries
          path: dist/

      - name: Make binary executable (Unix)
        if: matrix.os != 'windows'
        run: chmod +x ./dist/${{ matrix.binary }}

      - name: Verify binary executes
        shell: bash
        env:
          BINARY: ${{ matrix.binary }}
        run: ./dist/"$BINARY" --version > /dev/null 2>&1

      - name: Verify version string
        shell: bash
        env:
          BINARY: ${{ matrix.binary }}
        run: |
          VERSION_OUTPUT=$(./dist/"$BINARY" --version 2>&1)
          echo "Version output: $VERSION_OUTPUT"

          EXPECTED_VERSION=$(jq -r .version package.json)
          if echo "$VERSION_OUTPUT" | grep -q "$EXPECTED_VERSION"; then
            echo "Version check passed: found $EXPECTED_VERSION"
          else
            echo "::error::Version mismatch. Expected '$EXPECTED_VERSION' in output: '$VERSION_OUTPUT'"
            exit 1
          fi

      - name: Smoke test --help
        shell: bash
        env:
          BINARY: ${{ matrix.binary }}
        run: ./dist/"$BINARY" --help

      - name: Validate config archive (Unix)
        if: matrix.os != 'windows'
        env:
          CONFIG_ARCHIVE: ${{ matrix.config-archive }}
        run: |
          mkdir -p config-test
          tar -xzf "dist/$CONFIG_ARCHIVE" -C config-test
          # Verify every entry that should be in the slim archive exists…
          test -d config-test/.claude/agents || (echo "::error::Missing .claude/agents" && exit 1)
          test -d config-test/.opencode/agents || (echo "::error::Missing .opencode/agents" && exit 1)
          test -d config-test/.github/agents || (echo "::error::Missing .github/agents" && exit 1)
          test -f config-test/.github/lsp.json || (echo "::error::Missing .github/lsp.json" && exit 1)
          test -d config-test/.atomic/workflows/hello/claude || (echo "::error::Missing .atomic/workflows/hello/claude" && exit 1)
          test -d config-test/.atomic/workflows/hello/copilot || (echo "::error::Missing .atomic/workflows/hello/copilot" && exit 1)
          test -d config-test/.atomic/workflows/hello/opencode || (echo "::error::Missing .atomic/workflows/hello/opencode" && exit 1)
          # …and that the entries that moved to skills CLI are absent.
          test ! -e config-test/.claude/skills || (echo "::error::Unexpected .claude/skills in archive" && exit 1)
          test ! -e config-test/.opencode/skills || (echo "::error::Unexpected .opencode/skills in archive" && exit 1)
          test ! -e config-test/.github/skills || (echo "::error::Unexpected .github/skills in archive" && exit 1)
          echo "Config archive validation passed"

      - name: Validate config archive (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          CONFIG_ARCHIVE: ${{ matrix.config-archive }}
        run: |
          New-Item -ItemType Directory -Path config-test -Force
          Expand-Archive -Path "dist/$env:CONFIG_ARCHIVE" -DestinationPath config-test
          # Verify every entry that should be in the slim archive exists…
          if (-not (Test-Path "config-test/.claude/agents")) { Write-Error "Missing .claude/agents"; exit 1 }
          if (-not (Test-Path "config-test/.opencode/agents")) { Write-Error "Missing .opencode/agents"; exit 1 }
          if (-not (Test-Path "config-test/.github/agents")) { Write-Error "Missing .github/agents"; exit 1 }
          if (-not (Test-Path "config-test/.github/lsp.json")) { Write-Error "Missing .github/lsp.json"; exit 1 }
          if (-not (Test-Path "config-test/.atomic/workflows/hello/claude")) { Write-Error "Missing .atomic/workflows/hello/claude"; exit 1 }
          if (-not (Test-Path "config-test/.atomic/workflows/hello/copilot")) { Write-Error "Missing .atomic/workflows/hello/copilot"; exit 1 }
          if (-not (Test-Path "config-test/.atomic/workflows/hello/opencode")) { Write-Error "Missing .atomic/workflows/hello/opencode"; exit 1 }
          # …and that the entries that moved to skills CLI are absent.
          if (Test-Path "config-test/.claude/skills") { Write-Error "Unexpected .claude/skills in archive"; exit 1 }
          if (Test-Path "config-test/.opencode/skills") { Write-Error "Unexpected .opencode/skills in archive"; exit 1 }
          if (Test-Path "config-test/.github/skills") { Write-Error "Unexpected .github/skills in archive"; exit 1 }
          Write-Host "Config archive validation passed"

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, validate-binaries, publish-workflow-sdk]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: binaries
          path: dist/

      - name: Get version from package.json
        id: version
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Determine release type
        id: release-type
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "make_latest=false" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "make_latest=true" >> $GITHUB_OUTPUT
          fi

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Delete existing release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null | while read -r name; do
            gh release delete-asset "$TAG" "$name" --yes 2>/dev/null || true
          done
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ steps.release-type.outputs.is_prerelease == 'true' }}
          make_latest: ${{ steps.release-type.outputs.make_latest }}
          generate_release_notes: true
          files: |
            dist/atomic-linux-x64
            dist/atomic-linux-arm64
            dist/atomic-darwin-x64
            dist/atomic-darwin-arm64
            dist/atomic-windows-x64.exe
            dist/atomic-windows-arm64.exe
            dist/atomic-config.tar.gz
            dist/atomic-config.zip
            dist/checksums.txt

  publish-workflow-sdk:
    name: Publish Workflow SDK to npm
    runs-on: ubuntu-latest
    needs: [validate-binaries]
    permissions:
      contents: read
      id-token: write # Required for OIDC provenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun ci
        working-directory: packages/workflow-sdk

      - name: Run tests
        run: bun run test 2>&1 | cat
        working-directory: packages/workflow-sdk

      - name: Run typecheck
        run: bun run typecheck
        working-directory: packages/workflow-sdk

      - name: Run lint
        run: bun run lint
        working-directory: packages/workflow-sdk

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: Determine npm publish tag
        id: npm-tag
        working-directory: packages/workflow-sdk
        run: |
          VERSION=$(jq -r .version package.json)
          if [[ "$VERSION" == *-* ]]; then
            echo "tag=next" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public --tag ${{ steps.npm-tag.outputs.tag }}
        working-directory: packages/workflow-sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
