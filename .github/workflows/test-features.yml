name: Test Devcontainer Features

on:
  pull_request:
    paths:
      - 'devcontainer-features/**'
  workflow_call:
    inputs:
      version:
        description: 'Atomic CLI version to test (defaults to version in package.json)'
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      version:
        description: 'Atomic CLI version to test (defaults to version in package.json)'
        required: false
        type: string
        default: ''

jobs:
  test-feature:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature: [claude, copilot, opencode]
    steps:
      - uses: actions/checkout@v6
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli
      - name: Set Atomic CLI version for feature testing
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(jq -r .version package.json)
          fi
          echo "Testing with Atomic CLI version: $VERSION"
          for feature in devcontainer-features/src/*/devcontainer-feature.json; do
            jq --arg v "$VERSION" '.options.version.default = $v' "$feature" > tmp.json && mv tmp.json "$feature"
          done
      - name: "Test ${{ matrix.feature }} feature init flow"
        run: devcontainer features test --skip-scenarios --features ${{ matrix.feature }} --project-folder ./devcontainer-features
  test-global:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli
      - name: Set Atomic CLI version for feature testing
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(jq -r .version package.json)
          fi
          echo "Testing with Atomic CLI version: $VERSION"
          for feature in devcontainer-features/src/*/devcontainer-feature.json; do
            jq --arg v "$VERSION" '.options.version.default = $v' "$feature" > tmp.json && mv tmp.json "$feature"
          done
      - name: "Test global cross-feature scenarios"
        run: devcontainer features test --global-scenarios-only --project-folder ./devcontainer-features
