name: Test Devcontainer Features

on:
  workflow_call:
  workflow_dispatch:

jobs:
  test-autogenerated:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: [claude, opencode, copilot]
        baseImage:
          - mcr.microsoft.com/devcontainers/base:ubuntu
          - ubuntu:latest
    steps:
      - uses: actions/checkout@v6
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli
      - name: "Test '${{ matrix.features }}' on '${{ matrix.baseImage }}'"
        run: devcontainer features test --skip-scenarios -f ${{ matrix.features }} -i ${{ matrix.baseImage }} --project-folder ./devcontainer-features

  test-scenarios:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: [claude, opencode, copilot]
    steps:
      - uses: actions/checkout@v6
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli
      - name: "Test '${{ matrix.features }}' scenarios"
        run: devcontainer features test -f ${{ matrix.features }} --skip-autogenerated --skip-duplicated --project-folder ./devcontainer-features

  test-global:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli
      - name: "Test global cross-feature scenarios"
        run: devcontainer features test --global-scenarios-only --project-folder ./devcontainer-features
