    <text x="64" y="92" fill="#cdd6f4" font-size="42" font-weight="850" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" text-anchor="start" opacity="1" letter-spacing="0">Run longer workflows with a lower blast radius</text>
