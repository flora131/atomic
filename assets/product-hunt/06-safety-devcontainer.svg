    <text x="118" y="642" fill="#a6adc8" font-size="19" font-weight="560" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" text-anchor="start" opacity="1" letter-spacing="0">The concern is real: agents doing more need better boundaries.</text><text x="118" y="671" fill="#a6adc8" font-size="19" font-weight="560" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" text-anchor="start" opacity="1" letter-spacing="0">Atomic gives the workflow a safer place to run.</text>
  
