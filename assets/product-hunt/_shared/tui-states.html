<!DOCTYPE html>
<!--
  tui-states.html — Five labeled TUI state templates for Atomic Product Hunt slides.

  Usage by slide workers:
    1. Copy the innerHTML of the <template id="tui-state-X"> element.
    2. Paste it into the slide HTML where the TUI chrome is needed.
    3. Link fonts.css, tokens.css, components.css, and tui.css in the slide head.

  Template IDs:
    tui-state-idle           — workflow tree visible, empty main pane, press-enter hint
    tui-state-multi-agent    — parallel agent sessions running with spinners
    tui-state-review-gate    — human-approval prompt foregrounded (mauve accent)
    tui-state-done           — checkmarks, summary stats, green accents
    tui-state-devcontainer   — sandboxed execution banner + output below

  Spinner glyphs (pick one frame per slide): ⠋⠙⠹⠸⠼⠴⠦⠧⠇⠏
  Allowed unicode: ✓ ✗ → … ○ ● │
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Atomic TUI States — template library</title>
</head>
<body>

<!-- =========================================================================
     STATE 1: idle
     Workflow picker open in sidebar. Main pane empty with → hint.
     ========================================================================= -->
<template id="tui-state-idle">
  <div class="tui" style="width:860px;height:480px;">

    <!-- Header bar: PICK mode badge, session name, counts -->
    <div class="tui__header">
      <div class="tui__header-badge tui__header-badge--graph">ATOMIC</div>
      <span class="tui__header-session">pr-review · claude</span>
      <div class="tui__header-counts">
        <span class="tui__count"><span class="tui-dim">○</span><span class="tui-dim"> 4</span></span>
      </div>
    </div>

    <!-- Body: sidebar + main -->
    <div class="tui__body">

      <!-- Sidebar: workflow picker -->
      <div class="tui__sidebar">
        <div class="tui__sidebar-header">
          <div class="tui__sidebar-header-badge tui__sidebar-header-badge--claude">CLAUDE</div>
          <span class="tui__sidebar-header-label">workflow › select</span>
          <span class="tui__sidebar-header-count">8 workflows</span>
        </div>

        <!-- Filter bar -->
        <div class="tui__filter">
          <span class="tui__filter-prompt">❯</span>
          <span class="tui__filter-text">filter workflows…</span>
        </div>

        <!-- Workflow list: builtin section -->
        <div class="tui__workflow-list">
          <div class="tui__section-label">
            <span class="tui__section-label-bar">▎</span>
            <span class="tui__section-label-text">claude</span>
          </div>

          <div class="tui__row tui__row--focused">
            <span class="tui__row-indicator">▸</span>
            <span class="tui__row-name">pr-review</span>
          </div>
          <div class="tui__row">
            <span class="tui__row-indicator tui-dim">  </span>
            <span class="tui__row-name">spec-from-issue</span>
          </div>
          <div class="tui__row">
            <span class="tui__row-indicator tui-dim">  </span>
            <span class="tui__row-name">multi-agent-research</span>
          </div>
          <div class="tui__row">
            <span class="tui__row-indicator tui-dim">  </span>
            <span class="tui__row-name">support-ticket-to-pr</span>
          </div>
          <div class="tui__row">
            <span class="tui__row-indicator tui-dim">  </span>
            <span class="tui__row-name">prod-alert-investigate</span>
          </div>
          <div class="tui__row">
            <span class="tui__row-indicator tui-dim">  </span>
            <span class="tui__row-name">ralph</span>
          </div>
          <div class="tui__row">
            <span class="tui__row-indicator tui-dim">  </span>
            <span class="tui__row-name">deep-research-codebase</span>
          </div>
          <div class="tui__row">
            <span class="tui__row-indicator tui-dim">  </span>
            <span class="tui__row-name">open-claude-design</span>
          </div>
        </div>
      </div>

      <!-- Main pane: idle hint -->
      <div class="tui__main">
        <div class="tui__idle-hint">
          <span class="tui-dim">→</span>&nbsp;<span>select a workflow and press ↵ to configure</span>
        </div>
      </div>

    </div>

    <!-- Statusbar: PICK mode -->
    <div class="tui__statusbar">
      <div class="tui__statusbar-badge tui__statusbar-badge--pick">PICK</div>
      <span class="tui__statusbar-info">pr-review</span>
      <div class="tui__statusbar-spacer"></div>
      <div class="tui__statusbar-hints">
        <span class="tui__hint">
          <span class="tui__hint-key">↑↓</span>
          <span class="tui__hint-label">navigate</span>
        </span>
        <span class="tui__hint">
          <span class="tui__hint-key">↵</span>
          <span class="tui__hint-label">select</span>
        </span>
        <span class="tui__hint">
          <span class="tui__hint-key">esc</span>
          <span class="tui__hint-label">quit</span>
        </span>
      </div>
    </div>

  </div>
</template>


<!-- =========================================================================
     STATE 2: multi-agent
     Parallel agent sessions running. Sidebar shows selected workflow.
     Main pane shows session graph: orchestrator → [claude-code, opencode, copilot-cli]
     ========================================================================= -->
<template id="tui-state-multi-agent">
  <div class="tui" style="width:860px;height:480px;">

    <!-- Header bar: GRAPH mode, workflow running -->
    <div class="tui__header">
      <div class="tui__header-badge tui__header-badge--graph">GRAPH</div>
      <span class="tui__header-session">multi-agent-research · claude</span>
      <div class="tui__header-counts">
        <span class="tui__count"><span class="tui-green">✓</span><span class="tui-dim"> 1</span></span>
        <span class="tui__count"><span class="tui-yellow">●</span><span class="tui-dim"> 3</span></span>
        <span class="tui__count"><span class="tui-dim">○</span><span class="tui-dim"> 0</span></span>
      </div>
    </div>

    <!-- Body: sidebar + main -->
    <div class="tui__body">

      <!-- Sidebar: workflow selected -->
      <div class="tui__sidebar">
        <div class="tui__sidebar-header">
          <div class="tui__sidebar-header-badge tui__sidebar-header-badge--claude">CLAUDE</div>
          <span class="tui__sidebar-header-label">workflow › running</span>
        </div>

        <div class="tui__workflow-list">
          <div class="tui__section-label">
            <span class="tui__section-label-bar">▎</span>
            <span class="tui__section-label-text">sessions</span>
          </div>

          <div class="tui__row tui__row--active">
            <span class="tui__spinner">⠹</span>
            <span class="tui__row-name tui-yellow">orchestrator</span>
          </div>
          <div class="tui__row tui__row--focused">
            <span class="tui__spinner">⠼</span>
            <span class="tui__row-name tui-yellow">claude-code</span>
          </div>
          <div class="tui__row">
            <span class="tui__spinner tui-dim">⠴</span>
            <span class="tui__row-name tui-yellow">opencode</span>
          </div>
          <div class="tui__row">
            <span class="tui__spinner tui-dim">⠦</span>
            <span class="tui__row-name tui-yellow">copilot-cli</span>
          </div>

          <div class="tui__section-label" style="margin-top:8px;">
            <span class="tui__section-label-bar">▎</span>
            <span class="tui__section-label-text">workflow</span>
          </div>
          <div class="tui__row">
            <span class="tui__row-indicator tui-dim">  </span>
            <span class="tui__row-name tui-muted">multi-agent-research</span>
          </div>
          <div class="tui__row">
            <span class="tui__row-indicator tui-dim">  </span>
            <span class="tui__row-name tui-dim">src/workflows/multi-agent-research.ts</span>
          </div>
        </div>
      </div>

      <!-- Main pane: session graph with 3 parallel running agents -->
      <div class="tui__main">
        <div class="tui__graph" style="flex-direction:column;gap:0;padding:16px 24px;">

          <!-- Orchestrator node (done) -->
          <div style="display:flex;justify-content:center;margin-bottom:0;">
            <div class="tui__node tui__node--done" style="width:160px;">
              <div class="tui__node-title">orchestrator</div>
              <div class="tui__node-duration tui__node-duration--done">0:04</div>
            </div>
          </div>

          <!-- Connector lines down to 3 parallel agents -->
          <div style="display:flex;justify-content:center;height:20px;position:relative;">
            <div style="width:1px;background:var(--mocha-overlay0);height:100%;margin:0 auto;"></div>
          </div>

          <!-- Horizontal line spanning all 3 agents -->
          <div style="display:flex;justify-content:center;margin-bottom:0;">
            <div style="display:flex;flex-direction:row;gap:24px;align-items:flex-start;">

              <!-- Agent 1: claude-code -->
              <div style="display:flex;flex-direction:column;align-items:center;gap:0;">
                <div style="width:1px;background:var(--mocha-overlay0);height:20px;"></div>
                <div class="tui__node tui__node--running tui__node--focused" style="width:160px;min-height:68px;">
                  <div class="tui__node-title">claude-code</div>
                  <div class="tui__node-duration tui__node-duration--running">
                    <span class="tui__spinner">⠹</span> 1:12
                  </div>
                  <div class="tui__node-hint tui-dim">scan diff</div>
                </div>
              </div>

              <!-- Agent 2: opencode -->
              <div style="display:flex;flex-direction:column;align-items:center;gap:0;">
                <div style="width:1px;background:var(--mocha-overlay0);height:20px;"></div>
                <div class="tui__node tui__node--running" style="width:160px;min-height:68px;">
                  <div class="tui__node-title">opencode</div>
                  <div class="tui__node-duration tui__node-duration--running">
                    <span class="tui__spinner tui-dim">⠼</span> 0:58
                  </div>
                  <div class="tui__node-hint tui-dim">draft notes</div>
                </div>
              </div>

              <!-- Agent 3: copilot-cli -->
              <div style="display:flex;flex-direction:column;align-items:center;gap:0;">
                <div style="width:1px;background:var(--mocha-overlay0);height:20px;"></div>
                <div class="tui__node tui__node--running" style="width:160px;min-height:68px;">
                  <div class="tui__node-title">copilot-cli</div>
                  <div class="tui__node-duration tui__node-duration--running">
                    <span class="tui__spinner tui-dim">⠦</span> 1:03
                  </div>
                  <div class="tui__node-hint tui-dim">compile report</div>
                </div>
              </div>

            </div>
          </div>

        </div>
      </div>

    </div>

    <!-- Statusbar: GRAPH mode, navigation hints -->
    <div class="tui__statusbar">
      <div class="tui__statusbar-badge tui__statusbar-badge--graph">GRAPH</div>
      <span class="tui__statusbar-info tui-yellow">● 3 background</span>
      <div class="tui__statusbar-spacer"></div>
      <div class="tui__statusbar-hints">
        <span class="tui__hint">
          <span class="tui__hint-key">↑↓←→</span>
          <span class="tui__hint-label">navigate</span>
        </span>
        <span class="tui__hint">
          <span class="tui__hint-key">↵</span>
          <span class="tui__hint-label">attach</span>
        </span>
        <span class="tui__hint">
          <span class="tui__hint-key">ctrl+b d</span>
          <span class="tui__hint-label">detach</span>
        </span>
        <span class="tui__hint">
          <span class="tui__hint-key">q</span>
          <span class="tui__hint-label">quit</span>
        </span>
      </div>
    </div>

  </div>
</template>


<!-- =========================================================================
     STATE 3: review-gate
     Human-approval prompt foregrounded in main pane. Mauve accent.
     Workflow: support-ticket-to-pr — step: request human approval
     ========================================================================= -->
<template id="tui-state-review-gate">
  <div class="tui" style="width:860px;height:480px;">

    <!-- Header bar -->
    <div class="tui__header">
      <div class="tui__header-badge tui__header-badge--warn">GRAPH</div>
      <span class="tui__header-session">support-ticket-to-pr · claude</span>
      <div class="tui__header-counts">
        <span class="tui__count"><span class="tui-green">✓</span><span class="tui-dim"> 2</span></span>
        <span class="tui__count"><span class="tui-sky">?</span><span class="tui-dim"> 1</span></span>
        <span class="tui__count"><span class="tui-dim">○</span><span class="tui-dim"> 1</span></span>
      </div>
    </div>

    <!-- Body -->
    <div class="tui__body">

      <!-- Sidebar -->
      <div class="tui__sidebar">
        <div class="tui__sidebar-header">
          <div class="tui__sidebar-header-badge tui__sidebar-header-badge--claude">CLAUDE</div>
          <span class="tui__sidebar-header-label">workflow › awaiting</span>
        </div>

        <div class="tui__workflow-list">
          <div class="tui__section-label">
            <span class="tui__section-label-bar">▎</span>
            <span class="tui__section-label-text">sessions</span>
          </div>

          <div class="tui__row">
            <span class="tui-green" style="font-size:11px;">✓</span>
            <span class="tui__row-name tui-green">orchestrator</span>
          </div>
          <div class="tui__row">
            <span class="tui-green" style="font-size:11px;">✓</span>
            <span class="tui__row-name tui-muted">triage-agent</span>
          </div>
          <div class="tui__row tui__row--active">
            <span class="tui-sky" style="font-size:11px;">?</span>
            <span class="tui__row-name tui-sky">pr-author</span>
          </div>
          <div class="tui__row">
            <span class="tui-dim" style="font-size:11px;">○</span>
            <span class="tui__row-name tui-dim">notifier</span>
          </div>

          <div class="tui__section-label" style="margin-top:8px;">
            <span class="tui__section-label-bar">▎</span>
            <span class="tui__section-label-text">steps</span>
          </div>
          <div class="tui__row">
            <span class="tui-green" style="font-size:11px;">✓</span>
            <span class="tui__row-name tui-muted">triage ticket</span>
          </div>
          <div class="tui__row">
            <span class="tui-green" style="font-size:11px;">✓</span>
            <span class="tui__row-name tui-muted">draft PR body</span>
          </div>
          <div class="tui__row tui__row--focused">
            <span class="tui-mauve" style="font-size:11px;">●</span>
            <span class="tui__row-name tui-mauve">request human approval</span>
          </div>
          <div class="tui__row">
            <span class="tui-dim" style="font-size:11px;">○</span>
            <span class="tui__row-name tui-dim">open pull request</span>
          </div>
        </div>
      </div>

      <!-- Main pane: human-approval prompt -->
      <div class="tui__main">
        <!-- Output context above the prompt -->
        <div class="tui__output" style="flex:0;padding-bottom:4px;">
          <div class="tui__output-line">
            <span class="tui__output-prefix">pr-author</span>
            <span class="tui__output-text tui-muted">Drafted pull request body from ticket #2847</span>
          </div>
          <div class="tui__output-line">
            <span class="tui__output-prefix">pr-author</span>
            <span class="tui__output-text tui-muted">Title: <span class="tui-text">fix: handle null session on timeout in executor</span></span>
          </div>
          <div class="tui__output-line">
            <span class="tui__output-prefix">pr-author</span>
            <span class="tui__output-text tui-muted">Base: <span class="tui-blue">main</span> · Head: <span class="tui-blue">fix/null-session-timeout</span></span>
          </div>
        </div>

        <!-- Review gate prompt -->
        <div class="tui__prompt">
          <div class="tui__prompt-title">
            <span class="tui-mauve">●</span>
            <span>Human approval required</span>
          </div>
          <div class="tui__prompt-body">
            The agent has drafted a pull request to <span class="tui-blue">main</span>.<br>
            Review the diff at <span class="tui-sapphire">.atomic/sessions/support-ticket-to-pr/pr-author/diff.patch</span><br>
            and confirm whether to open the PR on GitHub.
          </div>
          <div class="tui__prompt-options">
            <span class="tui__prompt-option">
              <span class="tui__prompt-option-key">[y]es</span>
              <span class="tui__prompt-option-label">open PR</span>
            </span>
            <span class="tui__prompt-option">
              <span class="tui__prompt-option-key">[n]o</span>
              <span class="tui__prompt-option-label">abort</span>
            </span>
            <span class="tui__prompt-option">
              <span class="tui__prompt-option-key">[d]iff</span>
              <span class="tui__prompt-option-label">view diff</span>
            </span>
            <span class="tui__prompt-option">
              <span class="tui__prompt-option-key">[e]dit</span>
              <span class="tui__prompt-option-label">revise body</span>
            </span>
          </div>
        </div>
      </div>

    </div>

    <!-- Statusbar: awaiting input -->
    <div class="tui__statusbar">
      <div class="tui__statusbar-badge tui__statusbar-badge--confirm">REVIEW</div>
      <span class="tui__statusbar-info tui-mauve">● waiting for response</span>
      <div class="tui__statusbar-spacer"></div>
      <div class="tui__statusbar-hints">
        <span class="tui__hint">
          <span class="tui__hint-key">↵</span>
          <span class="tui__hint-label">enter to respond</span>
        </span>
        <span class="tui__hint">
          <span class="tui__hint-key">ctrl+b d</span>
          <span class="tui__hint-label">detach</span>
        </span>
      </div>
    </div>

  </div>
</template>


<!-- =========================================================================

    <!-- Body -->
    <div class="tui__body">

        <div class="tui__workflow-list">

      <div class="tui__statusbar-hints">

        </span>

<!-- =========================================================================
     STATE 5: devcontainer
     Sandboxed execution banner at top. Normal agent output below.
     Workflow: prod-alert-investigate running inside ubuntu-22.04 devcontainer.
     ========================================================================= -->
<template id="tui-state-devcontainer">
  <div class="tui" style="width:860px;height:480px;">

    <!-- Header bar -->
    <div class="tui__header">
      <div class="tui__header-badge tui__header-badge--graph">GRAPH</div>
      <span class="tui__header-session">prod-alert-investigate · opencode</span>
      <div class="tui__header-counts">
        <span class="tui__count"><span class="tui-green">✓</span><span class="tui-dim"> 1</span></span>
        <span class="tui__count"><span class="tui-yellow">●</span><span class="tui-dim"> 2</span></span>
        <span class="tui__count"><span class="tui-dim">○</span><span class="tui-dim"> 1</span></span>
      </div>
    </div>

    <!-- Body -->
    <div class="tui__body">

      <!-- Sidebar -->
      <div class="tui__sidebar">
        <div class="tui__sidebar-header">
          <div class="tui__sidebar-header-badge tui__sidebar-header-badge--opencode">OPENCODE</div>
          <span class="tui__sidebar-header-label">workflow › running</span>
        </div>

        <div class="tui__workflow-list">
          <div class="tui__section-label">
            <span class="tui__section-label-bar">▎</span>
            <span class="tui__section-label-text">sessions</span>
          </div>

          <div class="tui__row">
            <span class="tui-green" style="font-size:11px;">✓</span>
            <span class="tui__row-name tui-green">orchestrator</span>
          </div>
          <div class="tui__row tui__row--focused">
            <span class="tui__spinner">⠸</span>
            <span class="tui__row-name tui-yellow">log-analyst</span>
          </div>
          <div class="tui__row">
            <span class="tui__spinner tui-dim">⠼</span>
            <span class="tui__row-name tui-yellow">metric-collector</span>
          </div>
          <div class="tui__row">
            <span class="tui-dim" style="font-size:11px;">○</span>
            <span class="tui__row-name tui-dim">report-writer</span>
          </div>

          <div class="tui__section-label" style="margin-top:8px;">
            <span class="tui__section-label-bar">▎</span>
            <span class="tui__section-label-text">environment</span>
          </div>
          <div class="tui__row">
            <span class="tui-sapphire" style="font-size:11px;">●</span>
            <span class="tui__row-name tui-sapphire">devcontainer</span>
          </div>
          <div class="tui__row">
            <span class="tui-dim" style="font-size:11px;"> </span>
            <span class="tui__row-name tui-dim">ubuntu-22.04 · isolated</span>
          </div>
          <div class="tui__row">
            <span class="tui-dim" style="font-size:11px;"> </span>
            <span class="tui__row-name tui-dim">no network · no host fs</span>
          </div>
        </div>
      </div>

      <!-- Main pane: devcontainer banner + output -->
      <div class="tui__main">

        <!-- Devcontainer isolation banner -->
        <div class="tui__banner tui__banner--devcontainer">
          <span class="tui__banner-label">devcontainer: ubuntu-22.04</span>
          <span class="tui-dim">·</span>
          <span class="tui__banner-detail">isolated · no network · ephemeral fs</span>
          <span class="tui-dim" style="margin-left:auto;font-size:11px;">ctrl+b d detach</span>
        </div>

        <!-- Agent output inside container -->
        <div class="tui__output">
          <div class="tui__output-line">
            <span class="tui__output-prefix">log-analyst</span>
            <span class="tui__output-text tui-muted">Pulling log snapshot from /var/log/atomic/executor.log…</span>
          </div>
          <div class="tui__output-line">
            <span class="tui__output-prefix">log-analyst</span>
            <span class="tui__output-text"><span class="tui-yellow">WARN</span> <span class="tui-muted">High p95 latency: 4.2s (threshold: 2.0s)</span></span>
          </div>
          <div class="tui__output-line">
            <span class="tui__output-prefix">log-analyst</span>
            <span class="tui__output-text tui-muted">Checking correlated error rate at 14:22 UTC…</span>
          </div>
          <div class="tui__output-line">
            <span class="tui__output-prefix">log-analyst</span>
            <span class="tui__output-text"><span class="tui-red">ERROR</span> <span class="tui-muted">503 spike: 47 errors in 3m window → executor restart</span></span>
          </div>
          <div class="tui__output-line">
            <span class="tui__output-prefix">metric-collector</span>
            <span class="tui__output-text"><span class="tui__spinner">⠸</span> <span class="tui-muted">Querying Prometheus: cpu, mem, rps…</span></span>
          </div>
          <div class="tui__output-line">
            <span class="tui__output-prefix">metric-collector</span>
            <span class="tui__output-text tui-muted">CPU: <span class="tui-yellow">82%</span>  MEM: <span class="tui-text">4.1 GB / 8 GB</span>  RPS: <span class="tui-text">312</span></span>
          </div>
          <div class="tui__output-line">
            <span class="tui__output-prefix tui-dim">container</span>
            <span class="tui__output-text tui-dim">All writes isolated to ephemeral /workspace — host fs untouched</span>
          </div>
        </div>
      </div>

    </div>

    <!-- Statusbar: opencode agent, detach hint -->
    <div class="tui__statusbar">
      <div class="tui__statusbar-badge tui__statusbar-badge--opencode">OPENCODE</div>
      <span class="tui__statusbar-info tui-yellow">⠸ log-analyst</span>
      <div class="tui__statusbar-spacer"></div>
      <div class="tui__statusbar-hints">
        <span class="tui__hint">
          <span class="tui__hint-key">ctrl+g</span>
          <span class="tui__hint-label">graph</span>
        </span>
        <span class="tui__hint">
          <span class="tui__hint-key">ctrl+b d</span>
          <span class="tui__hint-label">detach</span>
        </span>
      </div>
    </div>

  </div>
</template>

</body>
</html>
