[test]
# Limit test discovery to tests/ so vendored docs are not scanned
root = "tests"

# Use smaller JS heap + aggressive GC to prevent OOM on constrained machines
smol = true

# Coverage (opt-in via `bun run test:coverage`, not on every run)
coverageThreshold = { lines = 0.85, functions = 0.85, statements = 0.85 }
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
coverageSkipTestFiles = true
coveragePathIgnorePatterns = [
  # Entry points (not unit-testable)
  "src/cli.ts",
  "src/version.ts",
  # Tier 4: React/OpenTUI components (require component test infrastructure)
  "src/components/animated-blink-indicator.tsx",
  "src/components/parallel-agents-tree.tsx",
  "src/components/task-list-indicator.tsx",
  "src/theme/index.tsx",
  # Tier 4: Live SDK integrations (require running servers)
  "src/services/agents/clients/claude.ts",
  "src/services/agents/clients/opencode.ts",
  "src/services/agents/tools/opencode-mcp-bridge.ts",
  # Tier 4: Interactive CLI flows
  "src/commands/cli/init.ts",
  "src/commands/tui/agent-commands.ts",
  "src/commands/tui/workflow-commands.ts",
  # Tier 4: Telemetry I/O orchestration (fail-safe by design, pure functions tested separately)
  "src/services/telemetry/telemetry-cli.ts",
  "src/services/telemetry/telemetry-consent.ts",
  "src/services/telemetry/telemetry-errors.ts",
  "src/services/telemetry/telemetry-file-io.ts",
  "src/services/telemetry/telemetry-session.ts",
  "src/services/telemetry/telemetry-tui.ts",
  "src/services/telemetry/telemetry-upload.ts",
  "src/services/telemetry/telemetry.ts",
  # Tier 4: Graph engine I/O (subprocess/SDK dependent)
  "src/services/workflows/graph/nodes.ts",
  "src/services/workflows/graph/subagent-registry.ts",
  "src/services/workflows/graph/errors.ts",
  # Tier 3: Partially covered modules (need additional tests to reach 85%)
  "src/services/config/definitions.ts",
  "src/services/workflows/graph/builder.ts",
  "src/services/models/model-operations.ts",
  "src/services/agents/tools/registry.ts",
  "src/commands/tui/builtin-commands.ts",
  "src/components/tool-registry/index.ts",
  "src/lib/ui/mcp-output.ts",
  "src/services/config/mcp-config.ts",
  # Tier 4: Other I/O-heavy modules
  "src/services/config/config-path.ts",
  "src/theme/banner/banner.ts",
  "src/services/workflows/session.ts"
]

# Execution
timeout = 10000
