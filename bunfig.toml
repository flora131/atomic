[test]
root = "."

# Coverage (opt-in via `bun run test:coverage`, not on every run)
coverageThreshold = 0.85
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
coverageSkipTestFiles = true
coveragePathIgnorePatterns = [
  # Test infrastructure — coverageSkipTestFiles only skips *.test.ts/*.spec.ts,
  # not helpers, fixtures, mocks, or suite files loaded during tests
  "tests/**",
  # Temp files created during test runs (e.g. discovery tests writing to /tmp)
  "**/tmp/**",
  # macOS resolves temp dirs to /private/var/folders/…, which bypasses **/tmp/**
  "**/var/folders/**",
  # Compiled workflow temp files generated at runtime
  "**/.atomic/.tmp/**",
  # Entry points (not unit-testable)
  "src/cli.ts",
  "src/version.ts",
  # Scripts (standalone, not library code)
  "src/scripts/**",
  # React/OpenTUI components (require component test infrastructure)
  "src/components/**",
  "src/screens/**",
  "src/app.tsx",
  # Theme (React context + OpenTUI native resources)
  "src/theme/**",
  # React hooks (require React test renderer)
  "src/hooks/**",
  # State: React hooks, shell, keyboard, command handlers (deeply coupled to React)
  "src/state/chat/**",
  "src/state/chat/shell/**",
  "src/state/runtime/**",
  "src/state/streaming/**",
  # SDK client integrations (require running SDK servers)
  "src/services/agents/clients/**",
  "src/services/agents/subagent-tool-policy.ts",
  "src/services/agents/tools/opencode-mcp-bridge.ts",
  "src/services/agents/provider-events/contracts.ts",
  # Event adapter layer (tightly coupled to SDK sessions)
  "src/services/events/adapters/**",
  "src/services/events/consumers/echo-suppressor.ts",
  "src/services/events/debug-subscriber/**",
  "src/services/events/registry/handlers/**",
  "src/services/events/event-bus-provider.tsx",
  "src/services/events/hooks.ts",
  # Telemetry I/O orchestration (fail-safe by design, pure functions tested separately)
  "src/services/telemetry/**",
  # Config I/O
  "src/services/config/atomic-config.ts",
  "src/services/config/atomic-global-config.ts",
  "src/services/config/config-path.ts",
  "src/services/config/definitions.ts",
  "src/services/config/mcp-config.ts",
  "src/services/config/claude-config.ts",
  "src/services/config/agent-definition-loader.ts",
  "src/services/config/workflow-package.ts",
  # Agent/skill discovery (filesystem-dependent)
  "src/services/agent-discovery/discovery.ts",
  "src/services/agents/tools/discovery.ts",
  "src/services/agents/tools/registry.ts",
  # Model operations (SDK-dependent)
  "src/services/models/model-operations.ts",
  "src/services/models/model-operations/**",
  # SDK: non-testable runtime modules (require running agent CLIs, terminals, filesystems)
  "src/sdk/define-workflow.ts",
  "src/sdk/providers/**",
  "src/sdk/runtime/discovery.ts",
  "src/sdk/runtime/executor.ts",
  "src/sdk/runtime/panel.tsx",
  "src/sdk/runtime/theme.ts",
  "src/sdk/components/error-boundary.tsx",
  "src/sdk/components/orchestrator-panel.tsx",
  "src/sdk/components/compact-switcher.tsx",
  "src/sdk/components/session-graph-panel.tsx",
  # Builtin workflow implementations (SDK-session-dependent orchestration + subprocess helpers)
  "src/sdk/workflows/builtin/**",
  # Workflow runtime I/O (subprocess/SDK/filesystem dependent)
  "src/services/workflows/session.ts",
  "src/services/workflows/graph/nodes.ts",
  "src/services/workflows/graph/subagent-registry.ts",
  "src/services/workflows/graph/errors.ts",
  "src/services/workflows/graph/builder.ts",
  "src/services/workflows/graph/authoring/**",
  "src/services/workflows/graph/nodes/**",
  "src/services/workflows/graph/persistence/**",
  "src/services/workflows/graph/runtime/**",
  "src/services/workflows/runtime/executor/**",
  "src/services/workflows/conductor/**",
  "src/services/workflows/builtin/ralph/ralph-workflow.ts",
  # Workflow verification (wraps TypeScript compiler API — defensive branches untestable without fragile mocks)
  "src/services/workflows/verification/type-checking.ts",
  # System utilities (I/O-heavy)
  "src/services/system/download.ts",
  "src/services/system/file-lock.ts",
  "src/services/system/workflows.ts",
  "src/lib/spawn.ts",
  "src/lib/ui/clipboard.ts",
  "src/lib/ui/mention-parsing.ts",
  "src/lib/ui/mcp-output.ts",
  "src/lib/ui/markdown-selection-patch.ts",
  # Interactive CLI flows
  "src/commands/cli/init.ts",
  "src/commands/cli/init/**",
  "src/commands/cli/chat/**",
  "src/commands/tui/index.ts",
  "src/commands/tui/agent-commands.ts",
  "src/commands/tui/workflow-commands.ts",
  "src/commands/tui/workflow-commands/**",
  "src/commands/tui/builtin-commands.ts",
  "src/commands/catalog/**",
  "node_modules/**",
  "vendor/**",
  "generated/**",
  ".atomic/**",
  ".claude/**",
  ".github/**",
  ".opencode/**",
  ".playwright/**",
  ".vscode/**",
  ".devcontainer/**",
  "assets/**",
  "specs/**",
  "research/**",
  "devcontainer-features/**",
  "docs/**",
]

