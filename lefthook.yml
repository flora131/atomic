pre-commit:
    parallel: true
    commands:
        typecheck:
            run: bun run typecheck
        lint:
            glob: "*.{ts,tsx}"
            run: bun run lint
        test:
            run: bun test --bail --path-ignore-patterns 'tests/screens/e2e/**'

pre-push:
    commands:
        test-coverage:
            run: bun run test:coverage
