pre-commit:
    parallel: true
    commands:
        typecheck:
            run: bun run typecheck
        lint:
            glob: "*.{ts,tsx}"
            run: bun run lint
        workflow-sdk-typecheck:
            run: bun run --cwd packages/workflow-sdk typecheck
        workflow-sdk-lint:
            glob: "packages/workflow-sdk/**/*.{ts,tsx}"
            run: bun run --cwd packages/workflow-sdk lint
        workflow-sdk-test:
            run: bun run --cwd packages/workflow-sdk test </dev/null

pre-push:
    commands:
        workflow-sdk-test-coverage:
            run: bun run --cwd packages/workflow-sdk test:coverage </dev/null
