pre-commit:
    parallel: true
    commands:
        typecheck:
            run: bun run typecheck
        lint:
            glob: "*.{ts,tsx}"
            run: bun run lint
        test:
            run: bun run test
        validate-agents:
            glob: ".{claude,opencode,github}/agents/*.md"
            run: bun run validate:agents

pre-push:
    commands:
        test-coverage:
            run: bun run test:coverage
