[test]
root = "tests"

# Coverage (opt-in via `bun run test:coverage`, not on every run)
coverageThreshold = 0.85
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
coverageSkipTestFiles = true
coveragePathIgnorePatterns = [
  # Test infrastructure
  "tests/**",
  # Temp files
  "**/tmp/**",
  "**/var/folders/**",
  # Non-testable runtime modules (require running agent CLIs, terminals, filesystems)
  "src/define-workflow.ts",
  "src/providers/**",
  "src/runtime/discovery.ts",
  "src/runtime/executor.ts",
  "src/runtime/panel.ts",
  "src/runtime/theme.ts",
  # Components whose uncovered lines are type declarations or inline JSX
  # lambdas requiring internal error injection (ErrorBoundary fallback path)
  "src/components/error-boundary.tsx",
  "src/components/orchestrator-panel.tsx",
  "node_modules/**",
]
